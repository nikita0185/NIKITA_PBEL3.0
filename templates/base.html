<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}EduPredict AI Portal{% endblock %}</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        body { background-color: #f4f6f9; font-family: 'Segoe UI', sans-serif; }
        .wrapper { display: flex; width: 100%; align-items: stretch; }
        #sidebar { min-width: 260px; max-width: 260px; background: #1e293b; color: #fff; min-height: 100vh; }
        #sidebar .sidebar-header { padding: 20px; background: #0f172a; border-bottom: 1px solid #334155; }
        #sidebar ul li a { padding: 14px 20px; color: #cbd5e1; text-decoration: none; display: flex; align-items: center; transition: 0.2s; }
        #sidebar ul li a:hover { color: #fff; background: #334155; }
        #sidebar ul li.active > a { color: #fff; background: #2563eb; }
        #content { width: 100%; padding: 30px; }
    </style>
</head>
<body>
<div class="wrapper">
    <nav id="sidebar">
        <div class="sidebar-header">
            <h4 class="mb-0 fw-bold"><i class="fa-solid fa-graduation-cap text-primary me-2"></i>EduPredict AI</h4>
        </div>
        <ul class="list-unstyled p-2">
            <li><a href="/"><i class="fa-solid fa-square-plus me-3"></i>New Prediction</a></li>
            <li><a href="/dashboard"><i class="fa-solid fa-chart-pie me-3"></i>Analytics Dashboard</a></li>
            <li><a href="/history"><i class="fa-solid fa-database me-3"></i>Student Repository</a></li>
        </ul>
    </nav>
    <div id="content">
        {% block content %}{% endblock %}
    </div>
</div>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
